# Render blueprint for the SpiceRoute API.
#
# Render reads this file when you "New +" → "Blueprint" in the dashboard
# and point it at this repo (https://github.com/tintwym/spiceroute-backend).
# It provisions everything declaratively:
#
#   * one Docker-backed Web Service (this API)
#   * one managed Postgres instance
#   * the env vars below (with secrets left blank for you to fill in
#     via the dashboard — they're marked `sync: false`)
#
# Docs: https://render.com/docs/blueprint-spec
#
# Usage:
#
#   1. Push this repo to GitHub.
#   2. Render dashboard → "New +" → "Blueprint" → pick this repo.
#   3. Render shows a diff of what it will create. Approve.
#   4. After provisioning, open the new Web Service's "Environment" tab
#      and fill in the secret values: DATABASE_URL,
#      FIREBASE_CREDENTIALS_JSON. Save.
#      Optionally set OLLAMA_BASE_URL too (see notes below). With it
#      blank or unreachable the AI endpoints serve deterministic stub
#      content per request — the rest of the app works fine.
#   5. Trigger a manual deploy (or push to main if autoDeploy is on).
#   6. Your URL: https://<service-name>.onrender.com
#
# Render free tier sleeps after 15 min of inactivity → first request
# after sleep is a ~30 s cold start. Upgrade to "Starter" ($7/mo) for
# always-on. Postgres free tier expires after 90 days; use Neon for a
# free forever option (skip the `databases:` block below in that case).

services:
  - type: web
    name: spiceroute-api
    runtime: docker
    region: singapore                # closest to Asia; use frankfurt / oregon / ohio / virginia otherwise
    plan: starter                    # `free` works too; cold starts trade off

    # Paths are resolved relative to THIS file's directory (the backend
    # repo root). The Dockerfile sits right next to this blueprint.
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true

    # Start command: run migrations + seed FIRST, then boot uvicorn.
    #
    # We chain `scripts/release.sh && uvicorn ...` instead of using
    # `preDeployCommand` because the latter is a paid-tier-only
    # feature on Render — Free instances silently ignore it, which
    # means the migration would never run on a Free deploy and the
    # API's first SELECT against the new column would 500 with
    # `column "translations" does not exist`.
    #
    # `release.sh` exits non-zero if migrations fail, which means
    # uvicorn never starts and Render's health check fails — exactly
    # the behavior we want (deploy aborts instead of silently
    # serving 500s). The curated-recipes seed inside release.sh is
    # best-effort and won't block uvicorn boot.
    #
    # Note this runs on EVERY container start (incl. cold-boot after
    # the Free-tier 15-min idle spin-down), not just on deploys.
    # That's fine: `alembic upgrade head` is a no-op when the DB is
    # already at head, and `seed_curated_recipes --quick` skips rows
    # that already exist. The total overhead is <1 s on a warm DB.
    dockerCommand: bash scripts/release.sh && uvicorn app.main:app --host 0.0.0.0 --port $PORT

    envVars:
      # ---- Non-secret config ---------------------------------------
      - key: APP_NAME
        value: SpiceRoute API
      - key: DEBUG
        value: "false"
      # Default model tag. The model must already be `ollama pull`'d on
      # whatever host OLLAMA_BASE_URL points at.
      - key: OLLAMA_MODEL
        value: llama3.1:8b
      # Render's free / starter web tiers can't realistically run an 8B
      # model (no GPU, ~512 MB RAM). Leave OLLAMA_BASE_URL unset until
      # you have a host that can — the AI client falls back to stub
      # content per request when the URL is blank or unreachable.
      - key: AI_FORCE_STUB
        value: "1"
      - key: AI_RATE_LIMIT_PER_DAY
        value: "30"
      - key: AI_CHAT_PER_HOUR
        value: "50"
      # CORS — two knobs working together:
      #
      #   CORS_ORIGINS        Comma-separated EXACT origins. Lock to
      #                       your production domain(s).
      #   CORS_ORIGIN_REGEX   Python regex matched against Origin
      #                       header. Used here to allow every Vercel
      #                       preview deploy (which gets a unique
      #                       *.vercel.app subdomain per branch/commit)
      #                       to talk to this backend.
      #
      # NEVER ship `*` to production — it disables CORS protection.
      # Update the explicit list when the production domain changes.
      - key: CORS_ORIGINS
        value: https://spiceroute-recipe.vercel.app
      - key: CORS_ORIGIN_REGEX
        value: ^https://([a-z0-9-]+\.)*vercel\.app$

      # ---- Secrets (fill in via the Render dashboard) --------------
      #
      # `sync: false` tells Render "don't try to source this from the
      # blueprint — I'll set it by hand in the Environment tab". This
      # is the recommended pattern for anything you don't want in git.
      - key: DATABASE_URL
        sync: false                  # see below — paste asyncpg-format URL
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false                  # paste the entire contents of firebase-service-account.json
      # OPTIONAL. URL of a reachable Ollama instance (your VPS, a
      # Cloudflare-tunneled home server, RunPod, etc.). When set, also
      # delete `AI_FORCE_STUB` above so the client actually probes it.
      # Leave blank to keep the AI endpoints in stub mode.
      - key: OLLAMA_BASE_URL
        sync: false

# ---- Managed Postgres -----------------------------------------------
#
# Delete this whole block if you're using Neon — just set DATABASE_URL
# manually in the dashboard with your Neon URL (asyncpg format!).
#
# Render's Postgres connection string is libpq-style
# (`postgres://USER:PASS@HOST/DB`). The app needs the asyncpg format
# (`postgresql+asyncpg://...?ssl=require`), so after Render provisions
# the database, copy the "External Connection String" from its
# dashboard page and rewrite it as:
#
#   postgresql+asyncpg://USER:PASS@HOST/DB?ssl=require
#
# Then paste THAT into the DATABASE_URL field above.
databases:
  - name: spiceroute-db
    plan: starter                    # `free` works but expires after 90 days
    databaseName: spiceroute
    user: spiceroute
    region: singapore
