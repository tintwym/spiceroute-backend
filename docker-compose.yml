services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - image_data:/var/spiceroute-images
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  # Local Postgres for offline development. Opt in with `--profile local-db`.
  # When using this, also point DATABASE_URL in .env at db:5432 (see the
  # commented-out line in .env).
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: spiceroute
      POSTGRES_PASSWORD: spiceroute
      POSTGRES_DB: spiceroute
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spiceroute -d spiceroute"]
      interval: 5s
      timeout: 5s
      retries: 10
    profiles:
      - local-db

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@spiceroute.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    profiles:
      - tools

volumes:
  db_data:
  image_data:
